<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loverbyte — Room Ready</title>
    <link rel="stylesheet" href="./colors_and_type.css" />
    <link rel="stylesheet" href="./signup-final.css" />
  </head>
  <body data-final-mode="room-ready">
    <main class="lb-final" aria-label="Room ready confirmation">
      <div class="lb-final__stars" aria-hidden="true"></div>
      <div class="lb-final__glow lb-final__glow--pink" aria-hidden="true"></div>
      <div class="lb-final__glow lb-final__glow--blue" aria-hidden="true"></div>
      <span class="lb-final__chip lb-final__chip--a" aria-hidden="true">love talk</span>
      <span class="lb-final__chip lb-final__chip--b" aria-hidden="true">real signals</span>
      <span class="lb-final__chip lb-final__chip--c" aria-hidden="true">after hours</span>

      <section class="lb-final__card">
        <p class="lb-final__kicker">ROOM READY</p>
        <h1 class="lb-final__title">The room’s ready.</h1>
        <p class="lb-final__copy">No Dating Card needed right now. Post, reply, react, learn, laugh, and clock the tea at your own speed.</p>

        <div class="lb-final__actions">
          <button class="lb-final__primary" type="button" data-enter-app>
            <span>Enter Loverbyte</span>
            <span class="lb-final__arrow" aria-hidden="true">→</span>
          </button>
        </div>
        <p class="lb-final__micro">You can update your openness anytime.</p>
      </section>
    </main>

    <script src="./signup-final.js"></script>
  </body>
</html>
