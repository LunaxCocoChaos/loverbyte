<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loverbyte — You’re In</title>
    <link rel="stylesheet" href="./colors_and_type.css" />
    <link rel="stylesheet" href="./signup-final.css" />
  </head>
  <body data-final-mode="youre-in">
    <main class="lb-final" aria-label="Dating card completion confirmation">
      <div class="lb-final__stars" aria-hidden="true"></div>
      <div class="lb-final__glow lb-final__glow--pink" aria-hidden="true"></div>
      <div class="lb-final__glow lb-final__glow--blue" aria-hidden="true"></div>
      <span class="lb-final__chip lb-final__chip--a" aria-hidden="true">crushes</span>
      <span class="lb-final__chip lb-final__chip--b" aria-hidden="true">real signals</span>
      <span class="lb-final__chip lb-final__chip--c" aria-hidden="true">love talk</span>

      <section class="lb-final__card">
        <p class="lb-final__kicker">YOU’RE IN</p>
        <h1 class="lb-final__title">You’re in.</h1>
        <p class="lb-final__copy">Your profile is live, your Dating Card is pinned, and the right people can see the signal before they send a Crush.</p>

        <div class="lb-final__actions">
          <button class="lb-final__primary" type="button" data-enter-app>
            <span>Enter Loverbyte</span>
            <span class="lb-final__arrow" aria-hidden="true">→</span>
          </button>
          <button class="lb-final__secondary" type="button" data-view-card>View My Dating Card</button>
        </div>
        <p class="lb-final__micro">You can edit or unpin your Dating Card anytime.</p>

        <article class="lb-final__preview" data-card-preview hidden>
          <div class="lb-final__previewPhoto" data-preview-photo aria-hidden="true"></div>
          <div>
            <p class="lb-final__previewName" data-preview-name>You</p>
            <p class="lb-final__previewLoc" data-preview-location>Location pending</p>
            <p class="lb-final__previewTag" data-preview-intent>Connection intent</p>
            <p class="lb-final__previewPrompt" data-preview-prompt>Prompt preview</p>
          </div>
        </article>
      </section>
    </main>

    <script src="./signup-final.js"></script>
  </body>
</html>
