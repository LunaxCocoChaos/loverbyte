<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loverbyte — Signup Entry</title>
    <link rel="stylesheet" href="./colors_and_type.css" />
    <link rel="stylesheet" href="./signup-step0.css" />
  </head>
  <body>
    <main class="lb-signup0" aria-label="Signup entry welcome screen">
      <div class="lb-signup0__stars" aria-hidden="true"></div>
      <div class="lb-signup0__glow lb-signup0__glow--pink" aria-hidden="true"></div>
      <div class="lb-signup0__glow lb-signup0__glow--blue" aria-hidden="true"></div>

      <section class="lb-signup0__card" data-signup-card>
        <span class="lb-signup0__chip lb-signup0__chip--a" aria-hidden="true">love talk</span>
        <span class="lb-signup0__chip lb-signup0__chip--b" aria-hidden="true">crushes</span>
        <span class="lb-signup0__chip lb-signup0__chip--c" aria-hidden="true">real signals</span>

        <p class="lb-signup0__kicker">ENTER THE ROOM</p>
        <h1 class="lb-signup0__title">Let’s get you in the room.</h1>
        <p class="lb-signup0__copy">Quick setup. No 47-question personality interrogation. Just enough to help people know who you are, what you’re here for, and whether you’re open to being approached.</p>

        <div class="lb-signup0__actions">
          <button type="button" class="lb-signup0__start" data-start>
            <span>Start →</span>
          </button>
        </div>
      </section>
    </main>

    <script src="./signup-step0.js"></script>
  </body>
</html>
