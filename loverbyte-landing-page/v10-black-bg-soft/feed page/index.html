<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loverbyte — Feed</title>
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="./feed.css" />
  </head>
  <body>
    <main class="lb-feed-page" aria-label="Loverbyte feed screen">
      <div class="lb-feed-page__stars" aria-hidden="true"></div>
      <div class="lb-feed-page__glow lb-feed-page__glow--pink" aria-hidden="true"></div>
      <div class="lb-feed-page__glow lb-feed-page__glow--blue" aria-hidden="true"></div>

      <section class="lb-feed-shell">
        <header class="lb-feed-topbar" aria-label="Feed top app bar">
          <button class="lb-feed-topbar__iconBtn" type="button" aria-label="Open menu">
            <span class="lb-icon-menu" aria-hidden="true"></span>
          </button>

          <a class="lb-feed-topbar__brand" href="./index.html" aria-label="Go to feed">
            <img src="../assets/loverbyte-wordmark-nav.png" alt="Loverbyte" />
          </a>
        </header>

        <section class="lb-user-entry" aria-label="User entry row">
          <button class="lb-user-entry__avatarBtn" type="button" aria-label="Open profile">
            <span class="lb-user-entry__avatarCore" aria-hidden="true"></span>
          </button>

          <div class="lb-user-entry__meta">
            <p class="lb-user-entry__handle">@username</p>
            <button class="lb-user-entry__trigger" type="button" aria-label="Start a new post">What’s poppin’, floppin’, byte-ing today? 👀☕️</button>
          </div>
        </section>

        <section class="lb-vibe-card" aria-label="Daily theme card">
          <p class="lb-vibe-card__kicker">
            <span class="lb-vibe-card__liveDot" aria-hidden="true"></span>
            <span>TODAY’S VIBE</span>
            <span class="lb-vibe-card__liveText">LIVE TODAY</span>
          </p>
          <h1 class="lb-vibe-card__title"><span class="lb-vibe-card__titleBase">Monday</span> <span class="lb-vibe-card__titleAccent">Money Moves</span></h1>
          <p class="lb-vibe-card__copy">Talk ambition, standards, money, dating, and the bag you’re building.</p>
        </section>

        <section class="lb-week-tabs" aria-label="Week day tabs">
          <div class="lb-week-tabs__scroller" role="group" aria-label="Choose feed day">
            <button class="lb-week-tabs__tab is-active" type="button" aria-pressed="true" data-day="Mon">Mon · Today</button>
            <button class="lb-week-tabs__tab" type="button" aria-pressed="false" data-day="Tue">Tue</button>
            <button class="lb-week-tabs__tab" type="button" aria-pressed="false" data-day="Wed">Wed</button>
            <button class="lb-week-tabs__tab" type="button" aria-pressed="false" data-day="Thu">Thu</button>
            <button class="lb-week-tabs__tab" type="button" aria-pressed="false" data-day="Fri">Fri</button>
            <button class="lb-week-tabs__tab" type="button" aria-pressed="false" data-day="Sat">Sat</button>
            <button class="lb-week-tabs__tab" type="button" aria-pressed="false" data-day="Sun">Sun</button>
          </div>
        </section>

        <section class="lb-feed-placeholder" aria-label="Feed content placeholder">
          <p>Feed starts here.</p>
        </section>
      </section>
    </main>

    <div class="lb-compose" data-compose hidden>
      <div class="lb-compose__backdrop" data-compose-close></div>
      <section class="lb-compose__sheet" role="dialog" aria-modal="true" aria-label="Create new post">
        <header class="lb-compose__head">
          <button class="lb-compose__cancel" type="button" data-compose-cancel>Cancel</button>
          <h2 class="lb-compose__title">New byte ☕</h2>
          <span class="lb-compose__spacer" aria-hidden="true"></span>
        </header>

        <div class="lb-compose__author">
          <span class="lb-compose__avatar" aria-hidden="true"></span>
          <p class="lb-compose__handle">@username</p>
        </div>

        <label class="lb-compose__field" for="composeText">
          <textarea id="composeText" maxlength="1000" placeholder="Drop a take, ask a question, start something…" data-compose-text></textarea>
        </label>

        <div class="lb-compose__tools">
          <button class="lb-compose__imageBtn" type="button" data-compose-image>
            Add image
          </button>
          <input type="file" accept="image/png,image/jpeg,image/webp,image/heic,image/heif" multiple hidden data-compose-image-input />
          <p class="lb-compose__meta" data-compose-image-meta>0/2 images</p>
          <p class="lb-compose__meta" data-compose-char>0/1000</p>
        </div>

        <p class="lb-compose__error" data-compose-error></p>

        <div class="lb-compose__preview" data-compose-preview hidden></div>

        <footer class="lb-compose__foot">
          <button class="lb-compose__post" type="button" data-compose-post disabled>Post</button>
        </footer>
      </section>
    </div>

    <script src="./feed.js"></script>
  </body>
</html>
