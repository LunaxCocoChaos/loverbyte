<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loverbyte — Account Setup</title>
    <link rel="stylesheet" href="./colors_and_type.css" />
    <link rel="stylesheet" href="./signup-step1-account.css" />
  </head>
  <body>
    <main class="lb-signup-account" aria-label="Create account screen">
      <div class="lb-signup-account__stars" aria-hidden="true"></div>
      <div class="lb-signup-account__glow lb-signup-account__glow--pink" aria-hidden="true"></div>
      <div class="lb-signup-account__glow lb-signup-account__glow--blue" aria-hidden="true"></div>

      <section class="lb-signup-account__card">
        <p class="lb-signup-account__kicker">ACCOUNT SETUP</p>
        <div class="lb-signup-account__progressTop" aria-label="Onboarding progress">
          <p class="lb-signup-account__progress">Room setup · 1/8</p>
          <div class="lb-signup-account__progressBar" aria-hidden="true">
            <span class="is-on"></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <h1 class="lb-signup-account__title">Create your Loverbyte account</h1>
        <p class="lb-signup-account__copy">Start with the basics. We’ll get to the love chaos in a second.</p>

        <div class="lb-signup-account__state" data-state-default>
          <button class="lb-signup-account__googleBtn" type="button" data-google>
            <svg class="lb-signup-account__googleMark" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C17 3.3 14.7 2.3 12 2.3 6.9 2.3 2.8 6.4 2.8 11.5s4.1 9.2 9.2 9.2c5.3 0 8.8-3.7 8.8-8.9 0-.6-.1-1.1-.1-1.6H12z"/>
              <path fill="#FBBC05" d="M3.9 7.9l3.2 2.3c.9-1.8 2.7-3 4.9-3 1.9 0 3.2.8 3.9 1.5l2.7-2.6C17 3.3 14.7 2.3 12 2.3 8.4 2.3 5.2 4.3 3.9 7.9z"/>
              <path fill="#34A853" d="M12 20.7c2.7 0 5-.9 6.6-2.5l-3.1-2.5c-.8.6-1.9 1-3.5 1-2.2 0-4-1.4-4.8-3.4l-3.3 2.5c1.4 2.7 4.2 4.9 8.1 4.9z"/>
              <path fill="#4285F4" d="M20.8 11.8c0-.6-.1-1.1-.1-1.6H12v3.9h5.5c-.3 1.3-1 2.3-2.1 3.1l3.1 2.5c1.8-1.7 3-4.2 3-7.9z"/>
            </svg>
            <span>Continue with Google</span>
          </button>

          <p class="lb-signup-account__divider"><span>or</span></p>

          <button class="lb-signup-account__emailOption" type="button" data-open-email>
            <span>Continue with Email</span>
          </button>

          <div class="lb-signup-account__checks">
            <label class="lb-signup-account__checkRow">
              <input type="checkbox" data-age-check />
              <span>I confirm I’m 18 or older.</span>
            </label>
            <label class="lb-signup-account__checkRow">
              <input type="checkbox" data-terms-check />
              <span>I agree to Loverbyte’s <a href="#" data-legal-link="terms">Terms</a>, <a href="#" data-legal-link="privacy">Privacy Policy</a>, and <a href="#" data-legal-link="rules">House Rules</a>.</span>
            </label>
            <span class="lb-signup-account__error" data-check-error></span>
          </div>
        </div>

        <form class="lb-signup-account__state lb-signup-account__state--email" data-state-email hidden novalidate>
          <button class="lb-signup-account__backLink" type="button" data-back-options>← Back to signup options</button>
          <p class="lb-signup-account__miniNote">Basics confirmed. Finish your email setup.</p>
          <label class="lb-signup-account__field" for="accountEmail">
            <span class="lb-signup-account__label">Email</span>
            <input id="accountEmail" type="email" placeholder="you@email.com" data-email required />
            <span class="lb-signup-account__error" data-email-error></span>
          </label>

          <label class="lb-signup-account__field" for="accountPassword">
            <span class="lb-signup-account__label">Password</span>
            <div class="lb-signup-account__passwordWrap">
              <input id="accountPassword" type="password" placeholder="Create a password" data-password required />
              <button class="lb-signup-account__showBtn" type="button" data-toggle-password="password">Show</button>
            </div>
            <span class="lb-signup-account__error" data-password-error></span>
          </label>

          <label class="lb-signup-account__field" for="accountConfirmPassword">
            <span class="lb-signup-account__label">Confirm password</span>
            <div class="lb-signup-account__passwordWrap">
              <input id="accountConfirmPassword" type="password" placeholder="Confirm password" data-confirm-password required />
              <button class="lb-signup-account__showBtn" type="button" data-toggle-password="confirm">Show</button>
            </div>
            <span class="lb-signup-account__error" data-confirm-error></span>
          </label>

          <button class="lb-signup-account__continue" type="submit" data-create-account disabled>
            <span>Create account</span>
            <span class="lb-signup-account__arrow" aria-hidden="true">→</span>
          </button>
        </form>

      </section>

      <div class="lb-signup-account__legalOverlay" data-legal-overlay hidden aria-hidden="true">
        <section
          class="lb-signup-account__legalModal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="legalModalTitle"
        >
          <div class="lb-signup-account__legalHead">
            <h2 class="lb-signup-account__legalTitle" id="legalModalTitle" data-legal-title></h2>
            <button class="lb-signup-account__legalClose" type="button" data-legal-close aria-label="Close legal content">
              ×
            </button>
          </div>
          <div class="lb-signup-account__legalBody" data-legal-body tabindex="0"></div>
        </section>
      </div>
    </main>

    <script src="./signup-step1-account.js"></script>
  </body>
</html>
