<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loverbyte Dating Card V2</title>
    <link rel="stylesheet" href="../../../loverbyte-feed-page/colors_and_type.css" />
    <link rel="stylesheet" href="./dating-card-v2.css" />
  </head>
  <body>
    <svg class="lb-dcv2-icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="lb-dcv2-icon-direction" viewBox="0 0 24 24">
        <path d="M7 7h10"></path>
        <path d="M14 4l3 3-3 3"></path>
        <path d="M17 17H7"></path>
        <path d="M10 14l-3 3 3 3"></path>
      </symbol>
      <symbol id="lb-dcv2-icon-intention" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8"></circle>
        <circle cx="12" cy="12" r="4"></circle>
        <circle cx="12" cy="12" r="1.6"></circle>
      </symbol>
      <symbol id="lb-dcv2-icon-style" viewBox="0 0 24 24">
        <path d="M10 14l4-4"></path>
        <path d="M7.3 16.7l-2 2a3 3 0 01-4.3-4.2l2-2a3 3 0 014.3 0"></path>
        <path d="M16.7 7.3l2-2a3 3 0 114.3 4.2l-2 2a3 3 0 01-4.3 0"></path>
      </symbol>
      <symbol id="lb-dcv2-icon-kids" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="2.7"></circle>
        <path d="M8.2 17.8a3.8 3.8 0 017.6 0"></path>
      </symbol>
      <symbol id="lb-dcv2-icon-distance" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8"></circle>
        <path d="M4.5 12h15"></path>
        <path d="M12 4.5a11.4 11.4 0 010 15"></path>
        <path d="M12 4.5a11.4 11.4 0 000 15"></path>
      </symbol>
      <symbol id="lb-dcv2-icon-pets" viewBox="0 0 24 24">
        <circle cx="6.3" cy="8.1" r="1.7"></circle>
        <circle cx="10.4" cy="5.9" r="1.7"></circle>
        <circle cx="14.6" cy="5.9" r="1.7"></circle>
        <circle cx="18.7" cy="8.1" r="1.7"></circle>
        <path d="M8 15.2c0-2.2 1.8-4 4-4s4 1.8 4 4c0 1.6-1.2 3.2-2.8 3.2-1 0-1.4-.5-2.2-.5s-1.2.5-2.2.5c-1.6 0-2.8-1.6-2.8-3.2z"></path>
      </symbol>
      <symbol id="lb-dcv2-icon-crush" viewBox="0 0 24 24">
        <path d="M12 20.2c-.2 0-.4-.1-.6-.2l-1.7-1.5C5.4 14.6 3 12.4 3 9.4A4.5 4.5 0 017.5 5c1.7 0 3.2.8 4.2 2.1A5.2 5.2 0 0116 5a4.5 4.5 0 014.5 4.4c0 3-2.4 5.2-6.7 9.1l-1.7 1.5c-.1.1-.3.2-.5.2z"></path>
        <path d="M13.8 8.1l4.4-4.4"></path>
        <path d="M15.1 3.7h3.1v3.1"></path>
      </symbol>
    </svg>

    <main class="lb-dcv2-page" aria-label="Standalone Loverbyte Dating Card V2 prototype">
      <section class="lb-dcv2-card" aria-label="Dating Card V2">
        <div class="lb-dcv2-media">
          <div class="lb-dcv2-carousel" data-dcv2-carousel>
            <article class="lb-dcv2-slide is-active" data-dcv2-slide>
              <img class="lb-dcv2-slide__img" src="./Headshot.png" alt="Kelly" />
            </article>
            <article class="lb-dcv2-slide" data-dcv2-slide>
              <img class="lb-dcv2-slide__img" src="./Body.jpeg" alt="Kelly, outfit" />
            </article>
            <article class="lb-dcv2-slide" data-dcv2-slide>
              <img class="lb-dcv2-slide__img" src="./Hiking.jpeg" alt="Kelly, hiking" />
            </article>
          </div>

          <div class="lb-dcv2-carousel__controls">
            <button class="lb-dcv2-carousel__arrow" type="button" data-dcv2-prev aria-label="Previous photo">‹</button>
            <p class="lb-dcv2-carousel__count" data-dcv2-count>1 / 3</p>
            <button class="lb-dcv2-carousel__arrow" type="button" data-dcv2-next aria-label="Next photo">›</button>
          </div>

          <div class="lb-dcv2-carousel__dots" role="tablist" aria-label="Photo selector">
            <button class="lb-dcv2-carousel__dot is-active" type="button" data-dcv2-dot="0" aria-label="Photo 1" aria-pressed="true"></button>
            <button class="lb-dcv2-carousel__dot" type="button" data-dcv2-dot="1" aria-label="Photo 2" aria-pressed="false"></button>
            <button class="lb-dcv2-carousel__dot" type="button" data-dcv2-dot="2" aria-label="Photo 3" aria-pressed="false"></button>
          </div>
        </div>

        <div class="lb-dcv2-info">
          <header class="lb-dcv2-header">
            <div class="lb-dcv2-header__identity">
              <h1 class="lb-dcv2-header__title">Kelly, 30s</h1>
              <p class="lb-dcv2-header__location">Los Angeles, CA</p>
            </div>
            <button class="lb-dcv2-header__settingsBtn" type="button" data-dcv2-settings aria-label="Dating Card settings">
              <span aria-hidden="true">⚙️</span> Dating Card Settings
            </button>
          </header>

          <section class="lb-dcv2-optional" aria-label="Optional details">
            <div class="lb-dcv2-scroller" data-dcv2-scroller>
              <div class="lb-dcv2-scroller__track" data-dcv2-scroller-track role="list" aria-label="Mandatory top-strip compatibility tags"></div>
            </div>
            <p class="lb-dcv2-optional__hint" data-dcv2-scroller-hint>Swipe for more →</p>
            <div class="lb-dcv2-scroller__indicator" data-dcv2-scroller-indicator aria-hidden="true">
              <span class="lb-dcv2-scroller__indicatorThumb" data-dcv2-scroller-thumb></span>
            </div>
          </section>

          <section class="lb-dcv2-core" aria-label="Core Details">
            <div class="lb-dcv2-stats" role="list" aria-label="Mandatory dating basics">
              <span class="lb-dcv2-stat" role="listitem"><svg class="lb-dcv2-stat__icon" aria-hidden="true"><use href="#lb-dcv2-icon-direction"></use></svg><span>F4M</span></span>
              <span class="lb-dcv2-stat" role="listitem"><svg class="lb-dcv2-stat__icon" aria-hidden="true"><use href="#lb-dcv2-icon-intention"></use></svg><span>Long-term</span></span>
              <span class="lb-dcv2-stat" role="listitem"><svg class="lb-dcv2-stat__icon" aria-hidden="true"><use href="#lb-dcv2-icon-style"></use></svg><span>Monogamous</span></span>
              <span class="lb-dcv2-stat" role="listitem"><svg class="lb-dcv2-stat__icon" aria-hidden="true"><use href="#lb-dcv2-icon-kids"></use></svg><span>No kids</span></span>
              <span class="lb-dcv2-stat" role="listitem"><svg class="lb-dcv2-stat__icon" aria-hidden="true"><use href="#lb-dcv2-icon-distance"></use></svg><span>Open to LDR</span></span>
              <span class="lb-dcv2-stat" role="listitem"><svg class="lb-dcv2-stat__icon" aria-hidden="true"><use href="#lb-dcv2-icon-pets"></use></svg><span>Dog parent</span></span>
            </div>
          </section>

          <section class="lb-dcv2-prompts" aria-label="Prompt cards">
            <article class="lb-dcv2-prompt">
              <p class="lb-dcv2-prompt__label">The way to get my attention is…</p>
              <p class="lb-dcv2-prompt__answer">Consistency with a little flirt.</p>
            </article>
            <article class="lb-dcv2-prompt">
              <p class="lb-dcv2-prompt__label">I’m not for you if…</p>
              <p class="lb-dcv2-prompt__answer">You think “wyd” counts as effort.</p>
            </article>
          </section>

          <footer class="lb-dcv2-footer">
            <button class="lb-dcv2-crush" type="button" data-dcv2-crush>
              <span aria-hidden="true">💘</span>
              <span>Send a Crush</span>
            </button>
          </footer>
        </div>
      </section>
    </main>

    <div class="lb-dcv2-toast" data-dcv2-toast hidden>Preview mode: visitors can send you a Crush from here.</div>

    <div class="lb-dcv2-lightbox" data-dcv2-lightbox hidden role="dialog" aria-modal="true" aria-label="Full photo viewer">
      <button class="lb-dcv2-lightbox__close" type="button" data-dcv2-lightbox-close aria-label="Close photo">✕</button>
      <img class="lb-dcv2-lightbox__img" data-dcv2-lightbox-img src="" alt="" />
    </div>

    <script src="./dating-card-v2.js"></script>
  </body>
</html>
